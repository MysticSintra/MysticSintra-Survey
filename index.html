<script>
  // Setup logic baseline criteria using real-time clock references
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dobField').setAttribute('max', today);
  document.getElementById('expiryField').setAttribute('min', today);

  const mainForm = document.getElementById('idValidationForm');
  const successBanner = document.getElementById('successBanner');

  mainForm.addEventListener('submit', function(event) {
    event.preventDefault(); // Trap page refresh workflows

    const formData = new FormData(mainForm);
    
    // Background dispatch straight to FormBold endpoints
    fetch(mainForm.action, {
      method: 'POST',
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        const loopChoice = document.querySelector('input[name="Loop_Option"]:checked').value;

        if (loopChoice === 'yes') {
          // Loop Branch execution context: Flush canvas, reset form data
          mainForm.reset();
          
          // Re-establish tracking constraints post-wipe
          document.getElementById('dobField').setAttribute('max', today);
          document.getElementById('expiryField').setAttribute('min', today);
          
          // Set window focus target context
          document.getElementById('fullName').focus();
          alert('Guest details sent! Please proceed with the details for the next guest.');
        } else {
          // Terminate loop: Hide input container layout, draw success banner view
          mainForm.style.display = 'none';
          successBanner.style.display = 'block';
        }
      } else {
        alert('FormBold server response fault. Ensure your target unique endpoint token is pasted correctly.');
      }
    }).catch(error => {
      alert('Network fault. The submission couldn\'t reach FormBold. Check connections and try again.');
    });
  });
</script>
