  <div id="successBanner" style="display: none; text-align: center; padding: 40px 20px; border: 1px solid #d4edda; background-color: #d1e7dd; color: #0f5132; border-radius: 8px;">
    <h2 style="margin: 0 0 10px 0;">🎉 Registration Complete!</h2>
    <p style="margin: 0;">Thank you. All guest forms have been successfully submitted to the server.</p>
  </div>

<script>
  let guestCount = 1;
  const today = new Date().toISOString().split('T')[0];

  // Initialize formatting limitations on initial elements
  function setDateConstraints(block) {
    block.querySelector('.dob-field').setAttribute('max', today);
    block.querySelector('.expiry-field').setAttribute('min', today);
  }
  setDateConstraints(document.getElementById('guestBlock_1'));

  // Listen to radio toggles dynamically
  document.addEventListener('change', function(e) {
    if (e.target && e.target.name === 'Loop_Option') {
      const submitBtn = document.getElementById('submitBtn');
      
      if (e.target.value === 'yes') {
        submitBtn.style.display = 'none'; // Keep hidden
        e.target.checked = false; // Reset radio selection state context immediately
        
        addNewGuestBlock();
      } else if (e.target.value === 'no') {
        submitBtn.style.display = 'block'; // Make action available
      }
    }
  });

  function addNewGuestBlock() {
    guestCount++;
    const container = document.getElementById('allGuestsContainer');
    const originalBlock = document.getElementById('guestBlock_1');
    
    // Duplicate clean DOM cluster layout configurations
    const clonedBlock = originalBlock.cloneNode(true);
    clonedBlock.id = `guestBlock_${guestCount}`;
    
    // Update labels and system references dynamically
    clonedBlock.querySelector('.guest-title').innerText = `Guest #${guestCount}`;
    
    // Scrub original values out of copy targets and append current counter suffix to names
    clonedBlock.querySelectorAll('input, select').forEach(input => {
      input.value = '';
      const baseName = input.name.replace(/_\d+$/, '');
      input.name = `${baseName}_${guestCount}`;
    });

    container.appendChild(clonedBlock);
    setDateConstraints(clonedBlock);

    // Scroll automatically into view context for optimal mobile ux
    clonedBlock.scrollIntoView({ behavior: 'smooth' });
  }

  // Intercept data pipeline dispatch actions
  const mainForm = document.getElementById('idValidationForm');
  const successBanner = document.getElementById('successBanner');

  mainForm.addEventListener('submit', function(event) {
    event.preventDefault();

    const formData = new FormData(mainForm);
    
    fetch(mainForm.action, {
      method: 'POST',
      body: formData,
      headers: {
        'Accept': 'application/json'
      }
    }).then(response => {
      if (response.ok) {
        mainForm.style.display = 'none';
        successBanner.style.display = 'block';
      } else {
        alert('FormBold rejected the submission. Please confirm your email is verified and the form is enabled in your FormBold dashboard.');
      }
    }).catch(error => {
      alert('Network fault. The submission couldn\'t reach FormBold. Check your connection or endpoint status.');
    });
  });
</script>
